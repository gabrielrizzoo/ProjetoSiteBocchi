<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Entre em contato conosco sobre Bocchi The Rock! — Envie sua mensagem, dúvida ou sugestão.">
    <title>Bocchi The Rock! — Contato</title>
    <link rel="stylesheet" href="./global.css">
    <link rel="stylesheet" href="./contato.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
</head>

<body>
    <!-- Mobile Menu Overlay -->
    <div class="menu-overlay" aria-hidden="true"></div>

    <header>
        <div class="logo-container">
            <a href="index.html" aria-label="Página inicial">
                <img id="logo" src="./assets/images/Logo Bocchi 2.png" alt="Bocchi The Rock! Logo">
            </a>
        </div>
        <button class="mobile-menu-btn" aria-label="Abrir menu">
            <span class="material-symbols-outlined">menu</span>
        </button>
        <nav class="main-nav" aria-label="Navegação principal">
            <ul class="nav-list">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="contato.html" class="nav-link active">Contato</a></li>
                <li><a href="fotos.html" class="nav-link">Fotos</a></li>
                <li><a href="comentarios.html" class="nav-link">Comentários</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="banner-section">
            <div id="banner" role="img" aria-label="Banner da página de contato">
                <div class="banner-content">
                    <h1>Fale Conosco</h1>
                    <p>Queremos ouvir você!</p>
                </div>
            </div>
        </section>

        <section id="form-section">
            <div id="form-container" class="reveal">
                <div class="form-header">
                    <span class="material-symbols-outlined form-icon">mail</span>
                    <h2>Envie sua mensagem</h2>
                </div>
                <form id="contact-form" method="post" action="processar_formulario.php">
                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="comentario">Mensagem</label>
                        <textarea id="comentario" name="comentario" rows="5"
                            placeholder="Escreva sua mensagem aqui..." required></textarea>
                    </div>
                    <button type="submit" class="btn-primary">
                        <span class="material-symbols-outlined">send</span>
                        Enviar Mensagem
                    </button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <a href="index.html" aria-label="Página inicial">
            <img id="logo-footer" src="./assets/images/Logo Bocchi 2.png" alt="Bocchi The Rock! Logo">
        </a>
        <div class="footer-divider"></div>
        <div class="footer-info">
            <p>Desenvolvido por Gabriel Rizzo</p>
            <p>© 2024 Bocchi The Rock! — Todos os direitos reservados</p>
        </div>
    </footer>

    <!-- Back to Top Button -->
    <button class="back-to-top" aria-label="Voltar ao topo">
        <span class="material-symbols-outlined">arrow_upward</span>
    </button>

    <script src="script.js"></script>
</body>

</html>
