<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bocchi The Rock! - Comentários</title>
    <link rel="stylesheet" href="./global.css" />
    <link rel="stylesheet" href="./comentarios.css" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>

<body>
    <header>
        <div class="logo-container">
            <a href="index.html" aria-label="Página inicial">
                <img id="logo" src="./assets/images/Logo Bocchi 2.png" alt="Bocchi The Rock! Logo" />
            </a>
        </div>
        <button class="mobile-menu-btn" aria-label="Abrir menu">
            <span class="material-symbols-outlined">menu</span>
        </button>
        <nav class="main-nav" aria-label="Navegação principal">
            <ul class="nav-list">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="contato.html" class="nav-link">Contato</a></li>
                <li><a href="fotos.html" class="nav-link">Fotos</a></li>
                <li><a href="comentarios.html" class="nav-link active">Comentários</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="banner-section">
            <div id="banner" role="img" aria-label="Banner de comentários">
                <div class="banner-content">
                    <h1>Mural de Fãs</h1>
                    <p>Compartilhe o seu amor por Bocchi the Rock!</p>
                </div>
            </div>
        </section>

        <section class="page-section">
            <div class="content-container flex-container">
                <div class="form-wrapper">
                    <h2>Deixe seu comentário</h2>
                    <form id="comment-form">
                        <div class="form-group">
                            <label for="name">Nome</label>
                            <input type="text" id="name" name="name" placeholder="Como quer ser chamado?" required>
                        </div>
                        <div class="form-group">
                            <label for="comment">Comentário</label>
                            <textarea id="comment" name="comment" rows="4" placeholder="Sua opinião sobre o anime..."
                                required></textarea>
                        </div>
                        <button type="submit" class="btn-primary">Enviar</button>
                    </form>
                </div>

                <div class="comments-wrapper">
                    <h2>Comentários Recentes</h2>
                    <ul id="comment-list">
                    </ul>
                </div>
            </div>
        </section>
    </main>

    <script src="./comentarios.js"></script>

    <footer>
        <a href="index.html" aria-label="Página inicial">
            <img id="logo-footer" src="./assets/images/Logo Bocchi 2.png" alt="Bocchi The Rock! Logo" />
        </a>
        <div class="footer-info">
            <p>Todos os Direitos reservados ©</p>
            <p>Desenvolvido por: Gabriel Rizzo</p>
        </div>
        <nav class="footer-nav" aria-label="Navegação do rodapé">
            <a href="index.html">Home</a>
            <a href="./contato.html">Contato</a>
            <a href="./fotos.html">Fotos</a>
            <a href="./comentarios.html">Comentários</a>
        </nav>
    </footer>

    <!-- Mobile Menu Script -->
    <script>
        const mobileBtn = document.querySelector('.mobile-menu-btn');
        const nav = document.querySelector('.main-nav');
        const icon = mobileBtn.querySelector('span');

        mobileBtn.addEventListener('click', () => {
            nav.classList.toggle('active');
            icon.textContent = nav.classList.contains('active') ? 'close' : 'menu';
        });
    </script>
</body>

</html>
