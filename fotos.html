<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bocchi The Rock! - Fotos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick-theme.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="./fotos.css"/>
</head>
<body>
    <header>
        <a href="./index.html" aria-label="Home page">
            <img id="logo" src="./assets/images/Logo Bocchi 2.png" alt="Bocchi The Rock! Logo" />
        </a>
        <nav aria-label="Main navigation">
            <ul>
                <a href="./index.html">
                    <li>Home</li>
                </a>
                <a href="./contato.html">
                    <li>Contato</li>
                </a>
                <a href="fotos.html">
                    <li>Fotos</li>
                </a>
                <a href="./comentarios.html">
                    <li>Comentários</li>
                </a>
            </ul>
        </nav>
    </header>

    <main>
        <section class="page-section">
            <div class="content-container">
                <h2>Fotos do Anime</h2>
                <div class="slider anime-slider">
                    <div><img src="./assets/images/anime1.jpg" alt="Bocchi tocando guitarra com a Kessoku Band"></div>
                    <div><img src="./assets/images/anime2.jpg" alt="Kessoku Band se apresentando no palco"></div>
                    <div><img src="./assets/images/anime3.jpg" alt="Grupo da Kessoku Band reunido"></div>
                    <div><img src="./assets/images/anime4.jpg" alt="Personagens de Bocchi the Rock em uma cena"></div>
                    <div><img src="./assets/images/anime5.jpg" alt="Bocchi com sua guitarra em close-up"></div>
                    <div><img src="./assets/images/anime6.jpg" alt="Membros da Kessoku Band em momento de lazer"></div>
                </div>
            </div>
        </section>

        <section class="page-section">
            <div class="content-container">
                <h2>Fotos de Shows</h2>
                <div class="slider shows-slider">
                    <div><img src="./assets/images/show.jpeg" alt="Kessoku Band se apresentando em um show ao vivo"></div>
                    <div><img src="./assets/images/show1.jpg" alt="Ilustração da Kessoku Band no palco com luzes"></div>
                    <div><img src="./assets/images/show2.jpg" alt="Membros da Kessoku Band em pose para show"></div>
                    <div><img src="./assets/images/show3.jpg" alt="Membros da Kessoku Band em pose para show"></div>
                </div>
            </div>
        </section>
    </main>

    <div id="imageModal" class="modal" aria-hidden="true" role="dialog" aria-modal="true">
    <span class="close-button" aria-label="Fechar imagem">&times;</span>
    <button class="modal-prev" aria-label="Imagem anterior"><i class="fas fa-chevron-left"></i></button>
    <img class="modal-content" id="modalImage" alt="Imagem ampliada">
    <button class="modal-next" aria-label="Próxima imagem"><i class="fas fa-chevron-right"></i></button>
    <div id="caption" class="modal-caption"></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick.min.js"></script>
    <script src="./fotos.js"></script>

    <footer>
        <a href="./index.html" aria-label="Home page">
            <img id="logo-footer" src="./assets/images/Logo Bocchi 2.png" alt="Bocchi The Rock! Logo" />
        </a>
        <p>Todos os Direitos reservados ©</p>
        <p>Desenvolvido por: Gabriel Rizzo</p>

        <nav class="footer-navigation" aria-label="Footer navigation">
            <ul class="footer-list">
                <a href="./index.html">
                    <li>Home</li>
                </a>
                <a href="./contato.html">
                    <li>Contato</li>
                </a>
                <a href="fotos.html">
                    <li>Fotos</li>
                </a>
                <a href="./comentarios.html">
                    <li>Comentários</li>
                </a>
            </ul>
        </nav>
    </footer>
</body>
</html>
