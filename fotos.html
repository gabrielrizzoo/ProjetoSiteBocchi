<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bocchi The Rock! - Fotos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick-theme.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"> <link rel="stylesheet" href="./fotos.css" />
</head>
<body>
    <header>
        <a href="./index.html" aria-label="Página inicial">
            <img id="logo" src="../assets/images/Logo Bocchi 2.png" alt="Bocchi The Rock! Logo" />
        </a>
        <nav aria-label="Navegação principal">
            <ul>
                <a href="./index.html">
                    <li>Home</li>
                </a>
                <a href="./contato.html">
                    <li>Contato</li>
                </a>
                <a href="fotos.html">
                    <li>Fotos</li>
                </a>
                <a href="./comentarios.html">
                    <li>Comentários</li>
                </a>
            </ul>
        </nav>
    </header>

    <main>
        <section class="page-section">
            <div class="content-container">
                <h2>Anime</h2>
                <div class="slider">
                    <div><img src="../assets/images/anime1.jpg" alt="Bocchi The Rock! Anime Image 1"></div>
                    <div><img src="../assets/images/anime2.jpg" alt="Bocchi The Rock! Anime Image 2"></div>
                    <div><img src="../assets/images/anime3.jpg" alt="Bocchi The Rock! Anime Image 3"></div>
                    <div><img src="../assets/images/anime4.jpg" alt="Bocchi The Rock! Anime Image 4"></div>
                    <div><img src="../assets/images/anime5.jpg" alt="Bocchi The Rock! Anime Image 5"></div>
                    <div><img src="../assets/images/anime6.jpg" alt="Bocchi The Rock! Anime Image 6"></div>
                    </div>
            </div>
        </section>

        <section class="page-section">
            <div class="content-container">
                <h2>Shows</h2>
                <div class="slider">
                    <div><img src="../assets/images/show.jpeg" alt="Bocchi The Rock! Live Show Image 1"></div>
                    <div><img src="../assets/images/show1.jpg" alt="Bocchi The Rock! Live Show Image 2"></div>
                    <div><img src="../assets/images/show2.jpg" alt="Bocchi The Rock! Live Show Image 3"></div>
                    <div><img src="../assets/images/show3.jpg" alt="Bocchi The Rock! Live Show Image 4"></div>
                    </div>
            </div>
        </section>
    </main>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick.min.js"></script>
    <script>
        $(document).ready(function(){
            $('.slider').slick({
                infinite: true,
                slidesToShow: 3,
                slidesToScroll: 1,
                autoplay: true, // Adicionado autoplay
                autoplaySpeed: 3000, // Velocidade do autoplay (3 segundos)
                dots: true, // Adicionado dots para navegação
                arrows: true, // Mantém as setas
                prevArrow: '<button type="button" class="slick-prev"><i class="fas fa-chevron-left"></i></button>', // Ícone Font Awesome
                nextArrow: '<button type="button" class="slick-next"><i class="fas fa-chevron-right"></i></button>', // Ícone Font Awesome
                responsive: [
                    {
                        breakpoint: 1024,
                        settings: {
                            slidesToShow: 2,
                            slidesToScroll: 1
                        }
                    },
                    {
                        breakpoint: 768,
                        settings: {
                            slidesToShow: 1,
                            slidesToScroll: 1
                        }
                    }
                ]
            });
        });
    </script>
    <footer>
        <a href="./index.html" aria-label="Página inicial">
            <img id="logo-footer" src="../assets/images/Logo Bocchi 2.png" alt="Bocchi The Rock! Logo" />
        </a>
        <p>Todos os Direitos reservados ©</p>
        <p>Desenvolvido por: Gabriel Rizzo</p>

        <nav class="footer-navigation" aria-label="Navegação do rodapé">
            <ul class="footer-list">
                <a href="./index.html">
                    <li>Home</li>
                </a>
                <a href="./contato.html">
                    <li>Contato</li>
                </a>
                <a href="fotos.html">
                    <li>Fotos</li>
                </a>
                <a href="./comentarios.html">
                    <li>Comentários</li>
                </a>
            </ul>
        </nav>
    </footer>
</body>
</html>
