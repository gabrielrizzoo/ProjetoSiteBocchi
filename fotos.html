<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Galeria de fotos de Bocchi The Rock! — Imagens do anime e shows da Kessoku Band.">
    <title>Bocchi The Rock! — Fotos</title>
    <link rel="stylesheet" href="./global.css">
    <link rel="stylesheet" href="./fotos.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
</head>

<body>
    <!-- Mobile Menu Overlay -->
    <div class="menu-overlay" aria-hidden="true"></div>

    <header>
        <div class="logo-container">
            <a href="index.html" aria-label="Página inicial">
                <img id="logo" src="./assets/images/Logo Bocchi 2.png" alt="Bocchi The Rock! Logo">
            </a>
        </div>
        <button class="mobile-menu-btn" aria-label="Abrir menu">
            <span class="material-symbols-outlined">menu</span>
        </button>
        <nav class="main-nav" aria-label="Navegação principal">
            <ul class="nav-list">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="contato.html" class="nav-link">Contato</a></li>
                <li><a href="fotos.html" class="nav-link active">Fotos</a></li>
                <li><a href="comentarios.html" class="nav-link">Comentários</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="banner-section">
            <div id="banner" role="img" aria-label="Banner de fotos">
                <div class="banner-content">
                    <h1>Galeria de Fotos</h1>
                    <p>Momentos inesquecíveis da Kessoku Band</p>
                </div>
            </div>
        </section>

        <section class="page-section gallery-section">
            <div class="content-container">
                <h2 class="section-title reveal">Fotos do Anime</h2>
                <div class="photo-grid reveal-stagger">
                    <div class="grid-item"><img src="./assets/images/anime1.jpg"
                            alt="Bocchi tocando guitarra com a Kessoku Band"></div>
                    <div class="grid-item tall"><img src="./assets/images/anime2.jpg"
                            alt="Kessoku Band se apresentando no palco"></div>
                    <div class="grid-item"><img src="./assets/images/anime3.jpg"
                            alt="Grupo da Kessoku Band reunido"></div>
                    <div class="grid-item wide"><img src="./assets/images/anime4.jpg"
                            alt="Personagens de Bocchi the Rock em uma cena"></div>
                    <div class="grid-item"><img src="./assets/images/anime5.jpg"
                            alt="Bocchi com sua guitarra em close-up"></div>
                    <div class="grid-item"><img src="./assets/images/anime6.jpg"
                            alt="Membros da Kessoku Band em momento de lazer"></div>
                </div>
            </div>
        </section>

        <section class="page-section gallery-section alt-bg">
            <div class="content-container">
                <h2 class="section-title reveal">Fotos de Shows</h2>
                <div class="photo-grid reveal-stagger">
                    <div class="grid-item wide"><img src="./assets/images/show.jpeg"
                            alt="Kessoku Band se apresentando em um show ao vivo"></div>
                    <div class="grid-item tall"><img src="./assets/images/show1.jpg"
                            alt="Ilustração da Kessoku Band no palco com luzes"></div>
                    <div class="grid-item"><img src="./assets/images/show2.jpg"
                            alt="Membros da Kessoku Band em pose para show"></div>
                    <div class="grid-item"><img src="./assets/images/show3.jpg"
                            alt="Membros da Kessoku Band em pose para show"></div>
                </div>
            </div>
        </section>
    </main>

    <!-- Modal for Fullscreen Image Viewer -->
    <div id="imageModal" class="modal" aria-hidden="true" role="dialog" aria-modal="true">
        <span class="close-button" aria-label="Fechar imagem">&times;</span>
        <button class="modal-prev" aria-label="Imagem anterior">
            <span class="material-symbols-outlined">chevron_left</span>
        </button>
        <img class="modal-content" id="modalImage" alt="Imagem ampliada">
        <button class="modal-next" aria-label="Próxima imagem">
            <span class="material-symbols-outlined">chevron_right</span>
        </button>
        <div id="caption" class="modal-caption"></div>
        <div class="modal-counter" id="modalCounter"></div>
    </div>

    <footer>
        <a href="index.html" aria-label="Página inicial">
            <img id="logo-footer" src="./assets/images/Logo Bocchi 2.png" alt="Bocchi The Rock! Logo">
        </a>
        <div class="footer-divider"></div>
        <div class="footer-info">
            <p>Desenvolvido por Gabriel Rizzo</p>
            <p>© 2024 Bocchi The Rock! — Todos os direitos reservados</p>
        </div>
    </footer>

    <!-- Back to Top Button -->
    <button class="back-to-top" aria-label="Voltar ao topo">
        <span class="material-symbols-outlined">arrow_upward</span>
    </button>

    <script src="./fotos.js"></script>
    <script src="script.js"></script>
</body>

</html>
